name: CI

# Run on every push and pull request.
on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build on both Linux and macOS so cross-platform issues (like a
        # header that is implicit on libstdc++ but not libc++) are caught
        # automatically.
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install pybind11 cmake

      - name: Configure
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="$(python -m pybind11 --cmakedir)"

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
